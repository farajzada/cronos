name: Cronos ETL Pipeline

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC
  workflow_dispatch: {} # manual trigger for testing

permissions:
  contents: write

concurrency:
  group: cronos-pipeline
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run scraper
        run: python -m src.scraper

      - name: Validate dataset integrity
        run: python -m src.validator

      - name: Generate dataset statistics
        run: python -m src.metrics

      - name: Generate dashboard
        run: python -m src.report

      - name: Commit and push if data changed
        run: |
          # Covers both modified tracked files and brand-new untracked files
          if [ -z "$(git status --porcelain -- data/ docs/)" ]; then
            echo "data/ and docs/ unchanged — exiting gracefully."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git commit -m "chore(data): daily dataset refresh ($(date -u +'%Y-%m-%d'))"
          git push
